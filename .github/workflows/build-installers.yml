name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            bundles: app
            use_custom_macos_dmg: true
          - name: Windows
            os: windows-latest
            bundles: nsis
            use_custom_macos_dmg: false
          - name: Linux
            os: ubuntu-22.04
            bundles: deb,rpm,appimage
            use_custom_macos_dmg: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect Rust host target
        id: rust-target
        shell: bash
        run: |
          target="$(rustc -vV | sed -n 's|host: ||p')"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "Rust host target: $target"

      - name: Read app version
        id: app-version
        shell: bash
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "App version: $version"

      - name: Build Tauri bundles
        if: matrix.use_custom_macos_dmg == false
        env:
          CI: true
          PROFILE: release
          TARGET: ${{ steps.rust-target.outputs.target }}
        run: pnpm tauri build --ci --no-sign --bundles ${{ matrix.bundles }}

      - name: Build custom macOS DMG
        if: matrix.use_custom_macos_dmg == true
        env:
          CI: true
          PROFILE: release
          TARGET: ${{ steps.rust-target.outputs.target }}
        run: bash scripts/build-macos-dmg.sh

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JnmBrowser_${{ steps.app-version.outputs.version }}_${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage

      - name: Upload files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
